server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Immutable hashed assets (Vite/SvelteKit output)
    location /_app/immutable/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Content images — long cache
    location /content/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Static images and logos
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback — serve file, .html extension, or root fallback
    location / {
        rewrite ^(.+)/$ $1 break;
        try_files $uri $uri.html /index.html;
    }

    # Disable access to dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
